trigger: none

extends:
  template: /eng/pipelines/templates/stages/1es-redirect.yml
  parameters:
    stages:
      - stage: CosmosLiveTestRunLease
        displayName: 'Lease fixed Cosmos live-test accounts'
        variables:
          - template: /eng/pipelines/templates/variables/globals.yml
          - template: /eng/pipelines/templates/variables/image.yml
        jobs:
          - job: WaitForOlderCosmosLiveTestRuns
            displayName: 'Wait for older Cosmos live-test runs'
            timeoutInMinutes: 310
            pool:
              name: $(LINUXPOOL)
              image: $(LINUXVMIMAGE)
              os: linux
            steps:
              - task: Bash@3
                displayName: 'Acquire Cosmos live-test run lease'
                inputs:
                  filePath: $(Build.SourcesDirectory)/sdk/cosmos/pipeline/wait-for-older-live-test-builds.sh
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  # Normal and weekly definitions share the same fixed account pool.
                  COSMOS_BUILD_LEASE_DEFINITION_IDS: '675,3686'

      - template: /eng/pipelines/templates/stages/archetype-sdk-tests-isolated.yml
        parameters:
          DependsOn: CosmosLiveTestRunLease
          DisallowStageRetry: true
          CloudConfig:
            Public:
              ServiceConnection: azure-sdk-tests-cosmos
          # Cosmos live tests run against fixed, self-owned accounts (RG sdk-ci) rather than
          # provisioning an account per run. The resolve pre-step reads the single JSON
          # secret (sub-config-cosmos-azure-cloud-test-resources) and selects the account
          # for each matrix leg via $(AccountSelector), exporting ACCOUNT_HOST/ACCOUNT_KEY.
          DisableAzureResourceCreation: true
          PreTestRunSteps:
            - template: /sdk/cosmos/pipeline/resolve-test-account-steps.yml
              parameters:
                AccountSelector: $(AccountSelector)
          MatrixConfigs:
            - Name: Cosmos_live_test
              Path: sdk/cosmos/live-platform-matrix.json
              Selection: all
              GenerateVMJobs: true
          MatrixReplace:
            - .*Version=1.2(1|5)/1.17
          ServiceDirectory: cosmos
          Artifacts:
            - name: azure-cosmos
              groupId: com.azure
              safeName: azurecosmos
          AdditionalModules:
            - name: azure-cosmos-tests
              groupId: com.azure
            - name: azure-cosmos-benchmark
              groupId: com.azure
          TimeoutInMinutes: 210
          MaxParallel: 20
          TestGoals: 'verify'
          TestOptions: '$(ProfileFlag) $(AdditionalArgs) -DskipCompile=true -DskipTestCompile=true -DcreateSourcesJar=false'
          TestResultsFiles: '**/junitreports/TEST-*.xml'
          AdditionalVariables:
            - name: AdditionalArgs
              value: '-DCOSMOS.CLIENT_LEAK_DETECTION_ENABLED=true'

      - template: /eng/pipelines/templates/stages/archetype-sdk-tests-isolated.yml
        parameters:
          TestName: 'Cosmos_Live_Test_Http2'
          DependsOn: CosmosLiveTestRunLease
          DisallowStageRetry: true
          CloudConfig:
            Public:
              ServiceConnection: azure-sdk-tests-cosmos
          # Fixed self-owned account (RG sdk-ci); no per-run provisioning.
          DisableAzureResourceCreation: true
          PreTestRunSteps:
            - template: /sdk/cosmos/pipeline/resolve-test-account-steps.yml
              parameters:
                AccountSelector: multimaster-session-http2
          MatrixConfigs:
            - Name: Cosmos_live_test_http2
              Path: sdk/cosmos/live-http2-platform-matrix.json
              Selection: all
              GenerateVMJobs: true
          MatrixReplace:
            - .*Version=1.2(1|5)/1.17
          ServiceDirectory: cosmos
          Artifacts:
            - name: azure-cosmos
              groupId: com.azure
              safeName: azurecosmos
          AdditionalModules:
            - name: azure-cosmos-tests
              groupId: com.azure
            - name: azure-cosmos-benchmark
              groupId: com.azure
          TimeoutInMinutes: 210
          MaxParallel: 20
          TestGoals: 'verify'
          TestOptions: '$(ProfileFlag) $(AdditionalArgs) -DskipCompile=true -DskipTestCompile=true -DcreateSourcesJar=false'
          TestResultsFiles: '**/junitreports/TEST-*.xml'
          AdditionalVariables:
            - name: AdditionalArgs
              value: '-DCOSMOS.CLIENT_LEAK_DETECTION_ENABLED=true -DCOSMOS.HTTP2_ENABLED=true -DCOSMOS.THINCLIENT_ENABLED=false'

      - template: /eng/pipelines/templates/stages/archetype-sdk-tests-isolated.yml
        parameters:
          TestName: 'Cosmos_Live_Test_Http2NetworkFault'
          DependsOn: CosmosLiveTestRunLease
          DisallowStageRetry: true
          PreSteps:
            - script: |
                sudo apt-get update -qq && sudo apt-get install -y -qq iptables
                echo \"iptables $(sudo iptables --version 2>/dev/null || echo 'not found')\"
              displayName: 'Install iptables for network fault injection'
          CloudConfig:
            Public:
              ServiceConnection: azure-sdk-tests-cosmos
          MatrixConfigs:
            - Name: Cosmos_live_test_http2_network_fault
              Path: sdk/cosmos/live-http2-network-fault-platform-matrix.json
              Selection: all
              GenerateVMJobs: true
          MatrixReplace:
            - .*Version=1.2(1|5)/1.17
          ServiceDirectory: cosmos
          Artifacts:
            - name: azure-cosmos
              groupId: com.azure
              safeName: azurecosmos
          AdditionalModules:
            - name: azure-cosmos-tests
              groupId: com.azure
          TimeoutInMinutes: 30
          MaxParallel: 1
          TestGoals: 'verify'
          TestOptions: '$(ProfileFlag) $(AdditionalArgs) -DskipCompile=true -DskipTestCompile=true -DcreateSourcesJar=false'
          TestResultsFiles: '**/junitreports/TEST-*.xml'
          AdditionalVariables:
            - name: AdditionalArgs
              # COSMOS.THINCLIENT_ENABLED / HTTP2_* are driven by the per-profile
              # <systemPropertyVariables> in azure-cosmos-tests/pom.xml so the Compute
              # matrix leg can route to the regional gateway on :443 instead of :10250.
              value: '-DCOSMOS.CLIENT_LEAK_DETECTION_ENABLED=true -DACCOUNT_HOST=$(thinclient-test-endpoint) -DACCOUNT_KEY=$(thinclient-test-key)'

      - template: /eng/pipelines/templates/stages/archetype-sdk-tests-isolated.yml
